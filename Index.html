<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VizionAI Studio - Lite</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #app { width: 100%; max-width: 500px; text-align: center; }
        textarea { width: 100%; height: 100px; margin: 10px 0; background: #222; color: white; border: 1px solid #444; border-radius: 8px; padding: 10px; }
        button { background: #ffcc00; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #video-box { width: 100%; height: 300px; background: #000; margin-top: 20px; display: flex; align-items: center; justify-content: center; border: 2px dashed #444; }
    </style>
</head>
<body>
    <div id="app">
        <h1>VizionAI Studio</h1>
        <textarea id="prompt" placeholder="Décris ta scène ici..."></textarea>
        <button onclick="generer()">Générer (Mode Simulation)</button>
        <div id="video-box">La vidéo apparaîtra ici...</div>
    </div>
    <script>
        function generer() {
            const prompt = document.getElementById('prompt').value;
            if(!prompt) { alert("Entre une description d'abord !"); return; }
            document.getElementById('video-box').innerHTML = "Simulation en cours pour : " + prompt + "<br><br><i>(L'IA travaille...)</i>";
            setTimeout(() => {
                document.getElementById('video-box').innerHTML = "Simulation terminée (Mode Mock)";
            }, 2000);
        }
    </script>
</body>
</html>
